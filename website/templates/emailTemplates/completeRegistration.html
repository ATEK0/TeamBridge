<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Template</title>
    <style>
        /* Reset CSS */
        body, p, h1, h2, h3, h4, h5, h6 {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        /* Container */
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Heading */
        .heading {
            text-align: center;
            margin-bottom: 20px;
        }
        .heading h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        /* Content */
        .content {
            margin-bottom: 20px;
        }
        /* Button */
        .button {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }
        /* Footer */
        .footer {
            text-align: center;
            color: #777;
        }
    </style>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <img src="favicon.png" width="150" height="150">
            <h1>Welcome to TeamGroup!</h1>
        </div>
        <div class="content">
            <p>Hi {firstName},</p>
            <p>Hope you love our platform.</p>
            <p>Complete your registration <a href="https://codebyateko.com/teamgroup/add-infos" >here</a>.</p>
        </div>
        <div class="footer">
            <p>&copy; {currentYear} TeamGroup. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
