{% extends "base.html" %}
{% block title %}Gestor de ficheiros{% endblock %}

{% block content %}

<form method="POST">
    <h3 align="center">Gestor de ficheiros</h3>
    <div class="form-group">
        <input type="file" class="form-control" id="file" name="file">
    </div>
    <br>
    <button type="submit" class="btn btn-primary">Upload</button>
</form>

{% if files %}

    {% for file in files %}
        <p>{{ file }}</p><a href="{{ url_for('views.download', filename=file) }}"><button type="button" class="btn btn-warning">download</button></a>
    {% endfor%}

{% else %}
    <p>Parece que você não tem ficheiros</p>
{% endif %}


{% endblock %}
