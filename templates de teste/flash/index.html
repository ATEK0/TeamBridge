<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash</title>
    <link rel="stylesheet" href="style.css" type="text/css">


    <style>

        .slide-in {
            animation: slide-in 0.5s ease;
        }

        .slide-out {
            animation: slide-out 0.5s ease;
        }

        @keyframes slide-in {
        from {
            transform: translatey(-100%);
        }
        to {
            transform: translatey(0);
        }
        }
        @keyframes slide-out {
            from {
                transform: translatey(0);
            }
            to {
                transform: translatey(-120%);
            }
        }
          
    </style>
</head>
<body>
    <div class="flash mb-3 ml-3 mr-3 mt-1" style="right: 0;">
        <div class="border-bottom border-left border-right border-{{category}} text-center" style="border-radius:20px 20px 20px 20px;width:20rem;border-width: 3px !important;">
            <div class="timer border-bottom border-light" style="border-width: 3px !important;width:90%"></div>
            <div class="flash-title font-weight-bold pl-2 pb-0 pr-2 pt-0">title</div>
            <div class="flash-content text-break pl-2 pb-2 pr-2 pt-0">This is the message shown to the usersaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</div>
        </div>
    </div>
    <script>

    </script>
    <div class="flash mb-3 ml-3 mr-3 mt-1" style="right: 0;">
        <div class="border-bottom border-left border-right border-info text-center" style="border-radius:0px 0px 20px 20px;max-width:20rem;border-width: 3px !important;">
            <div class="timer border-bottom border-info" style="border-width: 3px !important;"></div>
            <div class="flash-title font-weight-bold pl-2 pb-0 pr-2 pt-0">title</div>
            <div class="flash-content text-break pl-2 pb-2 pr-2 pt-0">This is the message shown to the usersaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</div>
        </div>
    </div>

    <button id="showFlashBtn">Show Flash Message</button>

      
    <div aria-live="polite" aria-atomic="true" style="position: relative; min-height: 200px;">
        <div class="toast bg-primary" style="position: absolute; top: 0; right: 0;">
          <div class="toast-header">
            <img src="..." class="rounded mr-2" alt="...">
            <strong class="mr-auto">Bootstrap</strong>
            <small>11 mins ago</small>
            <button type="button" class="ml-2 mb-1 close" data-dismiss="toast" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="toast-body">
            Hello, world! This is a toast message.
          </div>
        </div>
      </div>

    <script type="text/javascript" src="scripts.js"></script> <!--Para inserir js feito por nos, este deve ficar na pasta static-->



</body>
</html>
